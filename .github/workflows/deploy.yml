name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          REDIS_URL: redis://localhost:6379
          OPENAI_API_KEY: test-key
          CLOVA_OCR_URL: http://test
          CLOVA_OCR_SECRET: test-secret
          AWS_ACCESS_KEY: test-key
          AWS_SECRET_KEY: test-secret
          AWS_REGION: ap-northeast-2
          S3_BUCKET: test-bucket
          KAKAO_REST_API_KEY: test-key
          KAKAO_REDIRECT_URI: http://localhost:3000/auth/callback/kakao
          JWT_SECRET_KEY: test-secret-key-for-ci
        run: |
          cd backend
          PYTHONPATH=. pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'cd ~/clinicalcare && git pull origin main && docker-compose build --no-cache backend frontend && docker-compose up -d'
          rm -f key.pem
