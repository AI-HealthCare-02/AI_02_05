name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        run: |
          echo "HOST length: ${#HOST}"
          echo "USER length: ${#USER}"
          echo "KEY length: ${#KEY}"
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
          KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'cd ~/clinicalcare && git pull origin main && docker-compose build --no-cache backend frontend && docker-compose up -d'
          rm -f key.pem
